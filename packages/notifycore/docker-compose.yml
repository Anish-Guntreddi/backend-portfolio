services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: notifycore
      POSTGRES_PASSWORD: notifycore
      POSTGRES_DB: notifycore
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifycore -d notifycore"]
      interval: 2s
      timeout: 3s
      retries: 25
    volumes:
      - notifycore_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 25

  app:
    build:
      context: ../../
      dockerfile: packages/notifycore/Dockerfile
    environment:
      DATABASE_URL: postgres://notifycore:notifycore@postgres:5432/notifycore
      REDIS_URL: redis://redis:6379
      API_KEY: dev-notifycore-key
      PORT: 8082
      HOST: 0.0.0.0
      LOG_LEVEL: info
      RETRY_BASE_MS: 1000
      DEFAULT_MAX_ATTEMPTS: 5
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../../
      dockerfile: packages/notifycore/Dockerfile
    command: ["sh", "-c", "npx tsx src/worker-main.ts"]
    environment:
      DATABASE_URL: postgres://notifycore:notifycore@postgres:5432/notifycore
      REDIS_URL: redis://redis:6379
      API_KEY: dev-notifycore-key
      LOG_LEVEL: info
      RETRY_BASE_MS: 1000
      DEFAULT_MAX_ATTEMPTS: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  notifycore_pg:
